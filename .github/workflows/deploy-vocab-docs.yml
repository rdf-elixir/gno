name: Deploy Vocabulary Documentation

on:
  push:
    branches: [main]
    paths:
      - 'priv/vocabs/**'
      - 'Makefile'
      - '.github/workflows/deploy-vocab-docs.yml'

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install tools
        run: |
          pip install pylode==3.3.4
          sudo apt-get update
          sudo apt-get install -y raptor2-utils

      - name: Validate vocabularies
        run: make validate

      - name: Build artifacts
        run: make all

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
